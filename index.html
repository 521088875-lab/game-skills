<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>技能配置中台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1; --primary-hover: #4f46e5; --danger: #ef4444; --danger-hover: #dc2626;
            --bg-color: #f1f5f9; --card-bg: #ffffff; --text-main: #1e293b; --text-muted: #64748b;
            --border: #e2e8f0; --tag-bg: #e0e7ff; --tag-text: #4338ca;
        }
        
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* 彻底修复移动端滚动卡死问题 */
        html, body { height: auto; min-height: 100vh; overflow-x: hidden; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-color); color: var(--text-main); padding: 15px; }
        
        .container { max-width: 1400px; margin: 0 auto; padding-bottom: 40px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 5px; flex-wrap: wrap; gap: 15px; }
        .header-title { font-size: 24px; font-weight: 800; display: flex; align-items: center; gap: 10px; color: #334155; }
        .header-actions { display: flex; gap: 10px; width: 100%; }
        @media (min-width: 600px) { .header-actions { width: auto; } .header-title { font-size: 28px; } }
        
        .btn-header { flex: 1; background-color: #64748b; color: white; border: none; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s; white-space: nowrap; }
        .btn-header:hover { background-color: #475569; }

        .main-layout { display: grid; grid-template-columns: 1fr; gap: 20px; align-items: start; }
        @media (min-width: 900px) { .main-layout { grid-template-columns: 420px minmax(0, 1fr); gap: 24px; } }
        
        .card { background: var(--card-bg); border-radius: 16px; padding: 20px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); border: 1px solid var(--border); width: 100%; }
        
        /* 允许标题被点击进行折叠 */
        .card-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; color: #1e293b; cursor: pointer; user-select: none; padding-bottom: 10px; border-bottom: 1px dashed var(--border); }
        .card-title-left { display: flex; align-items: center; gap: 10px; }
        .card-title-left i { color: var(--primary); }
        .card-title-right { color: var(--text-muted); font-size: 16px; transition: transform 0.3s; }

        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #475569; }
        .form-control { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; outline: none; transition: 0.2s; box-sizing: border-box; -webkit-appearance: none; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        
        .tags-input-w { display: flex; gap: 8px; }
        .tags-display { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .tag-badge { background-color: var(--tag-bg); color: var(--tag-text); padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .tag-badge span { cursor: pointer; opacity: 0.6; font-weight: bold; font-size: 16px; }
        
        .attr-row { display: grid; grid-template-columns: 1fr 1fr 40px; gap: 8px; margin-bottom: 10px; }
        .btn-icon { background-color: var(--danger); color: white; border: none; width: 40px; height: 44px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-add-attr { width: 100%; background-color: #64748b; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 14px; margin-bottom: 15px; font-weight: 600; }
        
        .form-actions { display: flex; gap: 12px; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px; }
        .btn-primary { background-color: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; flex: 1; font-weight: 700; font-size: 15px; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-reset { background-color: #94a3b8; color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; flex: 1; font-weight: 700; font-size: 15px; }

        .search-w { position: relative; margin-bottom: 15px; width: 100%; }
        .search-w i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-w input { width: 100%; padding: 14px 14px 14px 40px; border: 1.5px solid var(--border); border-radius: 12px; outline: none; font-size: 14px; box-sizing: border-box; -webkit-appearance: none; }
        
        .skill-card { background: white; border: 1.5px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; border-left: 5px solid var(--primary); }
        .skill-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .skill-name { font-size: 18px; font-weight: 700; color: #4338ca; }
        .skill-actions { display: flex; gap: 6px; }
        .btn-sm { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; }
        .btn-edit { background: #f1f5f9; color: #475569; }
        .btn-del { background: #fee2e2; color: #ef4444; }

        .attr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; margin-top: 12px; }
        .attr-badge { background: #f8fafc; border: 1px solid var(--border); padding: 8px 10px; border-radius: 8px; font-size: 13px; word-break: break-all; }
        .attr-badge strong { color: #64748b; font-weight: 700; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-title">⚔️ 技能配置中台</div>
        <div class="header-actions">
            <button class="btn-header" onclick="exportData()">📤 导出数据</button>
            <button class="btn-header" onclick="document.getElementById('importFile').click()">📥 导入备份</button>
            <input type="file" id="importFile" style="display: none" accept=".json" onchange="importData(event)">
        </div>
    </div>

    <div class="main-layout">
        <div class="card">
            <div class="card-title" onclick="toggleForm()">
                <div class="card-title-left"><i class="fa-solid fa-circle-plus"></i> 添加/编辑记录</div>
                <div class="card-title-right"><i id="toggleIcon" class="fa-solid fa-chevron-up"></i></div>
            </div>
            
            <div id="formBody">
                <div class="form-group">
                    <label class="form-label">技能名称</label>
                    <input type="text" id="skillName" class="form-control" placeholder="输入名称...">
                    <input type="hidden" id="editId">
                </div>

                <div class="form-group">
                    <label class="form-label">通用标签</label>
                    <div class="tags-input-w">
                        <input type="text" id="tagInput" class="form-control" placeholder="输入标签按回车" onkeypress="if(event.key==='Enter')addTag()">
                        <button class="btn-primary" style="flex: 0 0 70px; padding: 0;" onclick="addTag()">添加</button>
                    </div>
                    <div class="tags-display" id="pendingTags"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">自定义属性</label>
                    <div id="attrContainer"></div>
                    <button class="btn-add-attr" onclick="addAttrRow()">+ 添加一行属性</button>
                </div>

                <div class="form-actions">
                    <button class="btn-primary" onclick="saveSkill()" id="saveBtn">💾 保存</button>
                    <button class="btn-reset" onclick="resetForm()">重置</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title" style="border:none; margin-bottom: 5px;">
                <div class="card-title-left"><i class="fa-solid fa-magnifying-glass"></i> 数据检索</div>
            </div>
            
            <div class="search-w">
                <input type="text" id="gSearch" class="form-control" placeholder="全局模糊搜索..." oninput="renderList()">
            </div>
            
            <button class="btn-add-attr" onclick="addFilterRow()" style="background:#475569; margin-bottom:10px;">+ 高级筛选条件 (AND)</button>
            <div id="filterContainer"></div>

            <div style="font-size: 14px; margin: 15px 0; color: var(--primary); font-weight:bold;">共找到 <span id="resCount">0</span> 条记录</div>
            
            <div id="skillList"></div>
        </div>
    </div>
</div>

<script>
    let skills = JSON.parse(localStorage.getItem('gameSkills_v2_data')) || [];
    let currentTags = [];

    window.onload = () => { 
        addAttrRow(); 
        renderList(); 
        // 手机端默认折叠表单，腾出视野
        if(window.innerWidth < 900) { toggleForm(); }
    };

    // 表单折叠功能
    function toggleForm() {
        const body = document.getElementById('formBody');
        const icon = document.getElementById('toggleIcon');
        if (body.style.display === 'none') {
            body.style.display = 'block';
            icon.className = 'fa-solid fa-chevron-up';
        } else {
            body.style.display = 'none';
            icon.className = 'fa-solid fa-chevron-down';
        }
    }

    function addTag() {
        const inp = document.getElementById('tagInput');
        const val = inp.value.trim();
        if (val && !currentTags.includes(val)) {
            currentTags.push(val); renderPendingTags(); inp.value = '';
        }
    }
    function removeTag(tag) { currentTags = currentTags.filter(t => t !== tag); renderPendingTags(); }
    function renderPendingTags() {
        document.getElementById('pendingTags').innerHTML = currentTags.map(t => `<div class="tag-badge">${t} <span onclick="removeTag('${t}')">×</span></div>`).join('');
    }

    function addAttrRow(k='', v='') {
        const row = document.createElement('div'); row.className = 'attr-row';
        row.innerHTML = `<input type="text" class="form-control a-key" placeholder="属性名" value="${k}"><input type="text" class="form-control a-val" placeholder="值(如 >50)" value="${v}"><button class="btn-icon" onclick="this.parentElement.remove()">×</button>`;
        document.getElementById('attrContainer').appendChild(row);
    }

    function saveSkill() {
        const name = document.getElementById('skillName').value.trim();
        const editId = document.getElementById('editId').value;
        if (!name) return alert('请填写名称！');

        const details = {};
        document.querySelectorAll('.attr-row').forEach(row => {
            const k = row.querySelector('.a-key').value.trim();
            let v = row.querySelector('.a-val').value.trim();
            if (k && v) { if (!isNaN(v) && v !== '') v = Number(v); details[k] = v; }
        });

        if (editId) {
            const idx = skills.findIndex(s => s.id === editId);
            skills[idx] = { ...skills[idx], name, tags: [...currentTags], details };
        } else {
            skills.push({ id: Date.now().toString(), name, tags: [...currentTags], details, date: new Date().toLocaleString() });
        }

        localStorage.setItem('gameSkills_v2_data', JSON.stringify(skills));
        resetForm(); renderList();
        
        // 手机端保存后自动折叠表单
        if(window.innerWidth < 900) { toggleForm(); window.scrollTo(0,0); }
    }

    function resetForm() {
        document.getElementById('skillName').value = ''; document.getElementById('editId').value = '';
        document.getElementById('saveBtn').innerHTML = '💾 保存';
        currentTags = []; renderPendingTags(); document.getElementById('attrContainer').innerHTML = ''; addAttrRow();
    }

    function editSkill(id) {
        const s = skills.find(x => x.id === id);
        document.getElementById('skillName').value = s.name; document.getElementById('editId').value = s.id;
        document.getElementById('saveBtn').innerHTML = '✔️ 更新记录';
        currentTags = [...s.tags]; renderPendingTags(); document.getElementById('attrContainer').innerHTML = '';
        Object.entries(s.details).forEach(([k,v]) => addAttrRow(k,v));
        
        // 手机端编辑时自动展开表单并滚动到顶部
        const body = document.getElementById('formBody');
        if(body.style.display === 'none') { toggleForm(); }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteSkill(id) {
        if(confirm('确定删除吗？')) { skills = skills.filter(s => s.id !== id); localStorage.setItem('gameSkills_v2_data', JSON.stringify(skills)); renderList(); }
    }

    function addFilterRow() {
        const row = document.createElement('div'); row.className = 'attr-row filter-row';
        row.innerHTML = `<input type="text" class="form-control f-key" placeholder="属性名" oninput="renderList()"><input type="text" class="form-control f-val" placeholder="值(如 >50)" oninput="renderList()"><button class="btn-icon" onclick="this.parentElement.remove();renderList()">×</button>`;
        document.getElementById('filterContainer').appendChild(row);
    }

    function checkNumeric(val, cond) {
        const m = cond.match(/^([><=!]+)\s*([\d.]+)$/);
        if (!m) return String(val).toLowerCase().includes(cond.toLowerCase());
        const op = m[1], target = parseFloat(m[2]), nVal = parseFloat(val);
        if (isNaN(nVal)) return false;
        switch(op) { case '>': return nVal > target; case '<': return nVal < target; case '>=': return nVal >= target; case '<=': return nVal <= target; case '=': case '==': return nVal === target; default: return false; }
    }

    function renderList() {
        const gs = document.getElementById('gSearch').value.toLowerCase();
        const filters = Array.from(document.querySelectorAll('.filter-row')).map(r => ({ k: r.querySelector('.f-key').value.trim(), v: r.querySelector('.f-val').value.trim() }));

        let count = 0;
        const html = skills.filter(s => {
            const sStr = JSON.stringify(s).toLowerCase();
            if (gs && !sStr.includes(gs)) return false;
            for (let f of filters) {
                if (!f.k && !f.v) continue;
                if (f.k && !f.v) { if (!s.tags.includes(f.k) && !s.details[f.k]) return false; } 
                else if (!f.k && f.v) { if (!Object.values(s.details).some(v => String(v).includes(f.v))) return false; } 
                else { if (!s.details[f.k] || !checkNumeric(s.details[f.k], f.v)) return false; }
            }
            return true;
        }).map(s => {
            count++;
            return `<div class="skill-card"><div class="skill-card-header"><div class="skill-name">${s.name}</div><div class="skill-actions"><button class="btn-sm btn-edit" onclick="editSkill('${s.id}')">编辑</button><button class="btn-sm btn-del" onclick="deleteSkill('${s.id}')">删除</button></div></div><div class="tags-display" style="margin-top:0">${s.tags.map(t => `<div class="tag-badge">${t}</div>`).join('')}</div><div class="attr-grid">${Object.entries(s.details).map(([k,v]) => `<div class="attr-badge"><strong>${k}:</strong> ${v}</div>`).join('')}</div></div>`;
        }).join('');

        document.getElementById('skillList').innerHTML = html || '<div style="text-align:center; padding:40px; color:#94a3b8;">暂无记录</div>';
        document.getElementById('resCount').innerText = count;
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(skills, null, 2)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `技能数据_${new Date().getTime()}.json`; a.click();
    }

    function importData(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try { const data = JSON.parse(ev.target.result); if (Array.isArray(data)) { skills = data; localStorage.setItem('gameSkills_v2_data', JSON.stringify(skills)); renderList(); alert('导入成功！'); } } catch(err) { alert('格式错误！'); }
        };
        reader.readAsText(file); e.target.value = '';
    }
</script>
</body>
</html>
